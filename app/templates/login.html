<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link href="{{ url_for('static', filename='bootstrap-5.3.0/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
    </style>
</head>

<body>
    <div class="container" style="max-width: 400px; margin-top: 15vh;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">系统登录</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-control" name="telephone" placeholder="请输入手机号" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 small">{{ error }}</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
