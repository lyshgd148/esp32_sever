{% extends "layout.html" %}
{% block title %}LED 灯光{% endblock %}

{% block extra_head %}
<style>
    .color-preview { width: 80px; height: 80px; border-radius: 12px; border: 2px solid #dee2e6; margin: 0 auto; }
</style>
{% endblock %}

{% block content %}
<div class="container px-3" style="max-width: 600px; margin-top: 6vh;">
    <div class="card shadow">
        <div class="card-header"><h5 class="mb-0">LED 灯光</h5></div>
        <div class="card-body">
            <div class="text-center mb-4">
                <input type="color" id="colorPicker" class="form-control-color" style="width: 100px; height: 60px;">
                <div class="color-preview mt-3" id="colorPreview" style="background-color: rgb(255,128,64);"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">R <span id="rVal" class="fw-bold">255</span></label>
                <input type="range" class="form-range" min="0" max="255" value="255" id="rSlider">
            </div>
            <div class="mb-3">
                <label class="form-label">G <span id="gVal" class="fw-bold">128</span></label>
                <input type="range" class="form-range" min="0" max="255" value="128" id="gSlider">
            </div>
            <div class="mb-3">
                <label class="form-label">B <span id="bVal" class="fw-bold">64</span></label>
                <input type="range" class="form-range" min="0" max="255" value="64" id="bSlider">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const socket = io({ transports: ["polling", "websocket"] });
    document.getElementById("wc").textContent = 0;
    socket.on("web_count", (d) => { document.getElementById("wc").textContent = d.count; });

    const picker = document.getElementById("colorPicker");
    const preview = document.getElementById("colorPreview");
    const rSlider = document.getElementById("rSlider");
    const gSlider = document.getElementById("gSlider");
    const bSlider = document.getElementById("bSlider");

    function updateSliders(r, g, b) {
        rSlider.value = r; gSlider.value = g; bSlider.value = b;
        document.getElementById("rVal").textContent = r;
        document.getElementById("gVal").textContent = g;
        document.getElementById("bVal").textContent = b;
        preview.style.backgroundColor = `rgb(${r},${g},${b})`;
    }

    function hexToRgb(hex) {
        return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
    }

    function sendColor() {
        socket.emit("color", { r: +rSlider.value, g: +gSlider.value, b: +bSlider.value });
    }

    picker.addEventListener("input", () => {
        const [r, g, b] = hexToRgb(picker.value);
        updateSliders(r, g, b);
    });
    picker.addEventListener("input", sendColor);

    function onSliderChange() {
        const r = +rSlider.value, g = +gSlider.value, b = +bSlider.value;
        document.getElementById("rVal").textContent = r;
        document.getElementById("gVal").textContent = g;
        document.getElementById("bVal").textContent = b;
        preview.style.backgroundColor = `rgb(${r},${g},${b})`;
        picker.value = rgbToHex(r, g, b);
    }

    rSlider.addEventListener("input", onSliderChange);
    gSlider.addEventListener("input", onSliderChange);
    bSlider.addEventListener("input", onSliderChange);

    [rSlider, gSlider, bSlider].forEach(s => {
        s.addEventListener("mouseup", sendColor);
        s.addEventListener("touchend", sendColor);
    });
</script>
{% endblock %}
